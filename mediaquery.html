<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <link rel="stylesheet" href="media.css">
</head>
<body>

<div class="grid-container">
    <div class="grid-item1"><h2>Header</h2></div>
    <div class="grid-item2"><h2>Navigation / Menu</h2></div>
    <div class="grid-item3"><h2>Left Side Content</h2></div>
    <div class="grid-item4"><h2>Main Content</h2></div>
    <div class="grid-item5"><h2>Right Side Content</h2></div>
    <div class="grid-item6"><h2>Footer</h2></div>
</div>

</body>
</html>
