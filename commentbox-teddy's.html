<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    .comment{
        background-color: rgba(0, 255, 255, 0.24);
        border-radius: 20px;
       display: flex;
       gap: 20px;
       margin-bottom: 20px;
       outline: 1px solid gray;
       background: white;
       transition: all 1s ease-in-out;
    }
    img{
        border: 2px solid black;
        border-radius: 50%;
        width: 50px;
        height: 50px;
    }
    span{
        float: right;
        
    }

    
</style>
</head>
<body>
    <div class="comments">
        <div class="comment">
            <div class="profile"></div>
            <img src="tim.jpg" alt="no image">
            <div class="content">
                <div class="header">

                <h3>Tim berners</h3>
                <span>5:00 pm</span>
            </div>
            <p>In 1989, while working at the research organization CERN in Switzerland, Berners-Lee proposed a system to help scientists share information easily through connected documents on computers.</p>

            <button class="reply-btn">reply</button>
        </div>
    </div>
</body>
</html>
